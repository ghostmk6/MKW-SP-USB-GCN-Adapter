name: Build MKW-SP
on:
  push:
    paths-ignore:
      - 'www/**'
      - 'tools/**'
      - '.github/workflows/build_tools.yml'
  pull_request:
    paths-ignore:
      - 'www/**'
      - 'tools/**'
      - '.github/workflows/build_tools.yml'
jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        profile:
          - debug
          - test
    runs-on: ubuntu-latest
    env:
      DEVKITPPC: opt/devkitpro/devkitPPC
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache DevkitPPC
        id: cache-1
        uses: actions/cache@v4
        with:
          path: cache
          key: ${{ runner.os }}-cache-dkp-r42.2-4
      - name: Download devkitPPC
        if: steps.cache-1.outputs.cache-hit != 'true'
        run: |
          mkdir cache && cd cache
          wget "https://wii.leseratte10.de/devkitPro/devkitPPC/r42%20%282023-04-19%29/devkitPPC-r42.2-1-linux_x86_64.pkg.tar.zst"
          cd ..
      - name: Extract devkitPPC
        run: tar -xf cache/devkitPPC-r42.2-1-linux_x86_64.pkg.tar.zst
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python packages
        run: |
          pip install --no-cache-dir \
            "protobuf==3.20.3" \
            "grpcio-tools==1.48.2" \
            json5 \
            pyelftools \
            itanium_demangler \
            setuptools
      - name: Pre-generate nanopb_pb2
        run: |
          cd vendor/nanopb/generator/proto
          python3 -c "
          import subprocess, sys
          result = subprocess.run(
            ['protoc', '--python_out=.', 'nanopb.proto', '-I.'],
            capture_output=True, text=True
          )
          print(result.stdout)
          print(result.stderr)
          sys.exit(result.returncode)
          "
      - name: Compile
        run: ./build.py --ci -- ${{ matrix.profile }}
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: mkw-sp-${{ matrix.profile }}
          path: out/${{ matrix.profile }}

  format:
    name: Format
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install clang-format-15
      - name: Format MKW-SP
        run: |
          dirs="common include loader payload stub"
          find $dirs -regex '.*\.\(c\|h\|cc\|hh\)' | xargs clang-format-15 --dry-run -Werror
