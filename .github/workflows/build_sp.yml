name: Build MKW-SP
on:
  push:
    paths-ignore:
      - 'www/**'
      - 'tools/**'
      - '.github/workflows/build_tools.yml'
  pull_request:
    paths-ignore:
      - 'www/**'
      - 'tools/**'
      - '.github/workflows/build_tools.yml'
jobs:
  build:
    name: Build
    strategy:
      fail-fast: false
      matrix:
        profile:
          - debug
          - test
    runs-on: ubuntu-22.04
    env:
      DEVKITPPC: opt/devkitpro/devkitPPC
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache DevkitPPC
        id: cache-1
        uses: actions/cache@v4
        with:
          path: cache
          key: ubuntu22-cache-dkp-r42.2-1
      - name: Download devkitPPC
        if: steps.cache-1.outputs.cache-hit != 'true'
        run: |
          mkdir cache && cd cache
          wget "https://wii.leseratte10.de/devkitPro/devkitPPC/r42%20%282023-04-19%29/devkitPPC-r42.2-1-linux_x86_64.pkg.tar.zst"
          cd ..
      - name: Extract devkitPPC
        run: tar -xf cache/devkitPPC-r42.2-1-linux_x86_64.pkg.tar.zst
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build protobuf-compiler python3-pip python3-protobuf
      - name: Install Python packages
        run: |
          pip3 install --no-cache-dir json5 pyelftools itanium_demangler setuptools
      - name: Compile
        run: ./build.py --ci -- ${{ matrix.profile }}
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: mkw-sp-${{ matrix.profile }}
          path: out/${{ matrix.profile }}

  format:
    name: Format
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install clang-format-15
      - name: Format MKW-SP
        run: |
          dirs="common include loader payload stub"
          find $dirs -regex '.*\.\(c\|h\|cc\|hh\)' | xargs clang-format-15 --dry-run -Werror
